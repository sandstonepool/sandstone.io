<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="irGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#94a3b8">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700" letter-spacing="0.5">Plutus Compiler Pipeline</text>
  <text x="450" y="50" text-anchor="middle" fill="#94a3b8" font-size="10">From Haskell source to on-chain binary</text>

  <!-- ═══════ STAGE BOXES ═══════ -->

  <!-- Stage 1: Haskell Source -->
  <rect x="30" y="75" width="130" height="70" rx="8" fill="url(#stageGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="95" y="104" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Plutus Tx</text>
  <text x="95" y="122" text-anchor="middle" fill="#ddd6fe" font-size="9">(Haskell subset)</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="110" x2="195" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="178" y="100" text-anchor="middle" fill="#64748b" font-size="8">GHC</text>

  <!-- Stage 2: GHC Core -->
  <rect x="200" y="75" width="130" height="70" rx="8" fill="url(#irGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="265" y="104" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">GHC Core</text>
  <text x="265" y="122" text-anchor="middle" fill="#bfdbfe" font-size="9">Standard IR</text>

  <!-- Arrow 2 -->
  <line x1="330" y1="110" x2="365" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="348" y="100" text-anchor="middle" fill="#64748b" font-size="8">Plugin</text>

  <!-- Stage 3: Plutus IR -->
  <rect x="370" y="75" width="130" height="70" rx="8" fill="url(#stageGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="435" y="99" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Plutus IR</text>
  <text x="435" y="115" text-anchor="middle" fill="#ddd6fe" font-size="9">ADTs, let-rec,</text>
  <text x="435" y="127" text-anchor="middle" fill="#ddd6fe" font-size="9">readable names</text>

  <!-- Arrow 3 -->
  <line x1="500" y1="110" x2="535" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="518" y="94" text-anchor="middle" fill="#64748b" font-size="7.5">Scott</text>
  <text x="518" y="103" text-anchor="middle" fill="#64748b" font-size="7.5">encoding</text>

  <!-- Stage 4: Typed Plutus Core -->
  <rect x="540" y="75" width="130" height="70" rx="8" fill="url(#irGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="605" y="99" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">TPLC</text>
  <text x="605" y="115" text-anchor="middle" fill="#bfdbfe" font-size="9">Typed Plutus Core</text>
  <text x="605" y="127" text-anchor="middle" fill="#bfdbfe" font-size="9">System F&#x3C9;&#x3BC;</text>

  <!-- Arrow 4 -->
  <line x1="670" y1="110" x2="705" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="688" y="94" text-anchor="middle" fill="#64748b" font-size="7.5">Type</text>
  <text x="688" y="103" text-anchor="middle" fill="#64748b" font-size="7.5">erasure</text>

  <!-- Stage 5: Untyped Plutus Core -->
  <rect x="710" y="75" width="160" height="70" rx="8" fill="url(#outputGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="790" y="99" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">UPLC</text>
  <text x="790" y="115" text-anchor="middle" fill="#d1fae5" font-size="9">Untyped Plutus Core</text>
  <text x="790" y="127" text-anchor="middle" fill="#d1fae5" font-size="9">de Bruijn indices</text>

  <!-- ═══════ KEY TRANSFORMATIONS (BOTTOM) ═══════ -->

  <text x="450" y="180" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Key Transformations at Each Stage</text>

  <!-- Transformation details -->
  <rect x="30" y="195" width="190" height="50" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="125" y="214" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Stage 1: Compilation</text>
  <text x="125" y="232" text-anchor="middle" fill="#94a3b8" font-size="8.5">Haskell compiled by GHC into</text>
  <text x="125" y="242" text-anchor="middle" fill="#94a3b8" font-size="8.5">its internal Core representation</text>

  <rect x="240" y="195" width="190" height="50" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="335" y="214" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Stage 2: Plugin Transform</text>
  <text x="335" y="232" text-anchor="middle" fill="#94a3b8" font-size="8.5">GHC plugin intercepts Core,</text>
  <text x="335" y="242" text-anchor="middle" fill="#94a3b8" font-size="8.5">translates to Plutus IR</text>

  <rect x="450" y="195" width="190" height="50" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="545" y="214" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600">Stage 3: Data Encoding</text>
  <text x="545" y="232" text-anchor="middle" fill="#94a3b8" font-size="8.5">ADTs eliminated via Scott encoding</text>
  <text x="545" y="242" text-anchor="middle" fill="#94a3b8" font-size="8.5">Recursion via fixpoint combinators</text>

  <rect x="660" y="195" width="210" height="50" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="765" y="214" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">Stage 4: Erasure + Serialisation</text>
  <text x="765" y="232" text-anchor="middle" fill="#94a3b8" font-size="8.5">Types erased, names to de Bruijn</text>
  <text x="765" y="242" text-anchor="middle" fill="#94a3b8" font-size="8.5">indices, serialised via flat format</text>

  <!-- On-chain output -->
  <rect x="310" y="270" width="280" height="50" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="450" y="292" text-anchor="middle" fill="#10b981" font-size="12" font-weight="700">On-Chain Script</text>
  <text x="450" y="308" text-anchor="middle" fill="#6ee7b7" font-size="9">flat-encoded UPLC in transaction output</text>

  <!-- Arrow from UPLC to on-chain -->
  <line x1="790" y1="145" x2="790" y2="258" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="790" y1="258" x2="595" y2="258" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="595" y1="258" x2="595" y2="268" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- CEK machine annotation -->
  <text x="750" y="320" text-anchor="middle" fill="#64748b" font-size="8.5">Evaluated on-chain by the CEK machine with deterministic cost accounting</text>
</svg>
