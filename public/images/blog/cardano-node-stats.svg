  <rect x="734" y="531" width="70" height="24" rx="12" fill="none" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="769" y="547" text-anchor="middle" fill="#6b7280" font-size="10">Dijkstra</text>

  <text x="830" y="547" fill="#6b7280" font-size="10">&#x2190; 8 hard forks, zero downtime</text>

