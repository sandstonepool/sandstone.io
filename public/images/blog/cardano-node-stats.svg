  <rect x="494" y="531" width="66" height="24" rx="12" fill="#374151"/>
  <text x="527" y="547" text-anchor="middle" fill="#d1d5db" font-size="10">Alonzo</text>

  <rect x="570" y="531" width="74" height="24" rx="12" fill="#374151"/>
