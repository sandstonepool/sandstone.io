  <text x="241" y="448" fill="#6b7280" font-size="9">2019</text>
  <text x="298" y="448" fill="#6b7280" font-size="9">2020</text>
  <text x="355" y="448" fill="#6b7280" font-size="9">2021</text>
  <text x="412" y="448" fill="#6b7280" font-size="9">2022</text>
  <text x="469" y="448" fill="#6b7280" font-size="9">2023</text>
