  <text x="390" y="142" text-anchor="middle" fill="#9ca3af" font-size="11">Core Repos</text>

  <line x1="480" y1="100" x2="480" y2="148" stroke="#374151" stroke-width="1"/>

  <!-- Stat: Contributors -->
