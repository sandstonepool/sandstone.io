<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="extGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="traceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="0.5">cardano-node Repository Architecture</text>
  <text x="450" y="56" text-anchor="middle" fill="#94a3b8" font-size="11">v10.6.2 &#xB7; 9 packages &#xB7; ~104,000 lines of Haskell</text>

  <!-- ═══════ CENTRAL NODE BOX ═══════ -->
  <rect x="295" y="80" width="310" height="140" rx="10" fill="url(#nodeGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="450" y="106" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">cardano-node</text>
  <text x="450" y="122" text-anchor="middle" fill="#bfdbfe" font-size="10">Integration Layer &amp; Full Node Executable</text>
  <line x1="320" y1="132" x2="580" y2="132" stroke="#60a5fa" stroke-opacity="0.4" stroke-width="1"/>
  <!-- Sub-modules -->
  <rect x="310" y="140" width="130" height="24" rx="4" fill="#1e40af" opacity="0.7"/>
  <text x="375" y="156" text-anchor="middle" fill="#dbeafe" font-size="9">Protocol / Era Config</text>
  <rect x="460" y="140" width="130" height="24" rx="4" fill="#1e40af" opacity="0.7"/>
  <text x="525" y="156" text-anchor="middle" fill="#dbeafe" font-size="9">P2P Topology</text>
  <rect x="310" y="172" width="130" height="24" rx="4" fill="#1e40af" opacity="0.7"/>
  <text x="375" y="188" text-anchor="middle" fill="#dbeafe" font-size="9">Shutdown / Signals</text>
  <rect x="460" y="172" width="130" height="24" rx="4" fill="#1e40af" opacity="0.7"/>
  <text x="525" y="188" text-anchor="middle" fill="#dbeafe" font-size="9">LedgerDB (LMDB/Mem)</text>

  <!-- ═══════ EXTERNAL DEPENDENCIES (TOP) ═══════ -->
  <!-- Consensus -->
  <rect x="40" y="100" width="200" height="50" rx="8" fill="url(#extGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="140" y="122" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">ouroboros-consensus</text>
  <text x="140" y="138" text-anchor="middle" fill="#ddd6fe" font-size="9">Praos &#xB7; Hard Fork Combinator</text>
  <!-- Arrow: consensus -> node -->
  <line x1="240" y1="125" x2="293" y2="135" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- Network -->
  <rect x="660" y="100" width="200" height="50" rx="8" fill="url(#extGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="760" y="122" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">ouroboros-network</text>
  <text x="760" y="138" text-anchor="middle" fill="#ddd6fe" font-size="9">Mux &#xB7; Typed Protocols &#xB7; P2P</text>
  <!-- Arrow: network -> node -->
  <line x1="660" y1="125" x2="607" y2="135" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- Ledger -->
  <rect x="40" y="170" width="200" height="50" rx="8" fill="url(#extGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="140" y="192" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">cardano-ledger</text>
  <text x="140" y="208" text-anchor="middle" fill="#ddd6fe" font-size="9">Byron &#x2192; Shelley &#x2192; &#x2026; &#x2192; Conway &#x2192; Dijkstra</text>
  <!-- Arrow: ledger -> node -->
  <line x1="240" y1="190" x2="293" y2="175" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- cardano-api -->
  <rect x="660" y="170" width="200" height="50" rx="8" fill="url(#extGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="760" y="192" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">cardano-api</text>
  <text x="760" y="208" text-anchor="middle" fill="#ddd6fe" font-size="9">High-level API &#xB7; Tx Building</text>
  <!-- Arrow: api -> node -->
  <line x1="660" y1="190" x2="607" y2="175" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- ═══════ TRACING SYSTEM (MIDDLE) ═══════ -->
  <text x="450" y="252" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600" letter-spacing="1.5">TRACING PIPELINE</text>

  <rect x="60" y="266" width="170" height="60" rx="8" fill="url(#traceGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="145" y="290" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">trace-dispatcher</text>
  <text x="145" y="306" text-anchor="middle" fill="#a7f3d0" font-size="9">Contra-tracer arrows</text>
  <text x="145" y="318" text-anchor="middle" fill="#a7f3d0" font-size="9">Severity &#xB7; Filtering &#xB7; Routing</text>

  <rect x="260" y="266" width="150" height="60" rx="8" fill="url(#traceGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="335" y="290" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">trace-forward</text>
  <text x="335" y="306" text-anchor="middle" fill="#a7f3d0" font-size="9">Typed protocols for</text>
  <text x="335" y="318" text-anchor="middle" fill="#a7f3d0" font-size="9">forwarding trace data</text>

  <rect x="440" y="266" width="150" height="60" rx="8" fill="url(#traceGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="515" y="290" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">trace-resources</text>
  <text x="515" y="306" text-anchor="middle" fill="#a7f3d0" font-size="9">OS-level metrics</text>
  <text x="515" y="318" text-anchor="middle" fill="#a7f3d0" font-size="9">Linux &#xB7; macOS &#xB7; Windows</text>

  <rect x="620" y="266" width="240" height="60" rx="8" fill="url(#traceGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="740" y="290" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">cardano-tracer</text>
  <text x="740" y="306" text-anchor="middle" fill="#a7f3d0" font-size="9">External monitoring service</text>
  <text x="740" y="318" text-anchor="middle" fill="#a7f3d0" font-size="9">Prometheus &#xB7; EKG &#xB7; Log Rotation &#xB7; RTView</text>

  <!-- Arrows between trace components -->
  <line x1="230" y1="296" x2="258" y2="296" stroke="#34d399" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="410" y1="296" x2="438" y2="296" stroke="#34d399" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="590" y1="296" x2="618" y2="296" stroke="#34d399" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Arrow from node to tracing -->
  <line x1="450" y1="220" x2="450" y2="264" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="446,262 450,270 454,262" fill="#34d399"/>

  <!-- ═══════ TOOLING ROW (BOTTOM) ═══════ -->
  <text x="450" y="365" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600" letter-spacing="1.5">TOOLING &amp; TESTING</text>

  <rect x="40" y="380" width="190" height="60" rx="8" fill="url(#toolGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="135" y="404" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">cardano-submit-api</text>
  <text x="135" y="420" text-anchor="middle" fill="#fef3c7" font-size="9">REST endpoint for Tx submission</text>
  <text x="135" y="432" text-anchor="middle" fill="#fef3c7" font-size="9">Servant &#xB7; Warp &#xB7; Prometheus</text>

  <rect x="260" y="380" width="190" height="60" rx="8" fill="url(#toolGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="355" y="404" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">cardano-testnet</text>
  <text x="355" y="420" text-anchor="middle" fill="#fef3c7" font-size="9">Spin up local testnets</text>
  <text x="355" y="432" text-anchor="middle" fill="#fef3c7" font-size="9">Hedgehog &#xB7; Property Tests</text>

  <rect x="480" y="380" width="190" height="60" rx="8" fill="url(#toolGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="575" y="404" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">cardano-node-chairman</text>
  <text x="575" y="420" text-anchor="middle" fill="#fef3c7" font-size="9">Multi-node consensus checker</text>
  <text x="575" y="432" text-anchor="middle" fill="#fef3c7" font-size="9">Verifies chain agreement</text>

  <rect x="700" y="380" width="160" height="60" rx="8" fill="url(#toolGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="780" y="404" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">cardano-node-capi</text>
  <text x="780" y="420" text-anchor="middle" fill="#fef3c7" font-size="9">FFI C library</text>
  <text x="780" y="432" text-anchor="middle" fill="#fef3c7" font-size="9">Embed node in other langs</text>

  <!-- ═══════ ERA TIMELINE (BOTTOM) ═══════ -->
  <text x="450" y="478" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">HARD FORK COMBINATOR &#x2014; ERA TIMELINE</text>

  <!-- Era boxes -->
  <rect x="40" y="495" width="92" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="86" y="510" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Byron</text>
  <text x="86" y="523" text-anchor="middle" fill="#64748b" font-size="8">v0-1</text>

  <rect x="148" y="495" width="92" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="194" y="510" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Shelley</text>
  <text x="194" y="523" text-anchor="middle" fill="#64748b" font-size="8">v2</text>

  <rect x="256" y="495" width="92" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="302" y="510" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Allegra</text>
  <text x="302" y="523" text-anchor="middle" fill="#64748b" font-size="8">v3</text>

  <rect x="364" y="495" width="72" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="400" y="510" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Mary</text>
  <text x="400" y="523" text-anchor="middle" fill="#64748b" font-size="8">v4</text>

  <rect x="452" y="495" width="92" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="498" y="510" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Alonzo</text>
  <text x="498" y="523" text-anchor="middle" fill="#64748b" font-size="8">v5-6</text>

  <rect x="560" y="495" width="92" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="606" y="510" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Babbage</text>
  <text x="606" y="523" text-anchor="middle" fill="#64748b" font-size="8">v7-8</text>

  <rect x="668" y="495" width="92" height="36" rx="6" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="714" y="510" text-anchor="middle" fill="#a5b4fc" font-size="9" font-weight="700">Conway</text>
  <text x="714" y="523" text-anchor="middle" fill="#818cf8" font-size="8">v9-10 (current)</text>

  <rect x="776" y="495" width="84" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="818" y="510" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">Dijkstra</text>
  <text x="818" y="523" text-anchor="middle" fill="#475569" font-size="8">v11 (next)</text>

  <!-- Era arrows -->
  <line x1="132" y1="513" x2="148" y2="513" stroke="#475569" stroke-width="1.2"/>
  <line x1="240" y1="513" x2="256" y2="513" stroke="#475569" stroke-width="1.2"/>
  <line x1="348" y1="513" x2="364" y2="513" stroke="#475569" stroke-width="1.2"/>
  <line x1="436" y1="513" x2="452" y2="513" stroke="#475569" stroke-width="1.2"/>
  <line x1="544" y1="513" x2="560" y2="513" stroke="#475569" stroke-width="1.2"/>
  <line x1="652" y1="513" x2="668" y2="513" stroke="#475569" stroke-width="1.2"/>
  <line x1="760" y1="513" x2="776" y2="513" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- ═══════ LEGEND ═══════ -->
  <rect x="40" y="550" width="820" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="60" y="567" width="12" height="12" rx="3" fill="#3b82f6"/>
  <text x="78" y="578" fill="#94a3b8" font-size="10">Core Node</text>
  <rect x="170" y="567" width="12" height="12" rx="3" fill="#8b5cf6"/>
  <text x="188" y="578" fill="#94a3b8" font-size="10">External Deps (separate repos)</text>
  <rect x="380" y="567" width="12" height="12" rx="3" fill="#10b981"/>
  <text x="398" y="578" fill="#94a3b8" font-size="10">Tracing &amp; Monitoring</text>
  <rect x="550" y="567" width="12" height="12" rx="3" fill="#f59e0b"/>
  <text x="568" y="578" fill="#94a3b8" font-size="10">Tooling &amp; Testing</text>
  <rect x="700" y="567" width="12" height="12" rx="3" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="718" y="578" fill="#94a3b8" font-size="10">Current Era</text>
</svg>