<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rustGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e45a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b7410e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="netGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="storGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="0.5">Torsten &#x2014; Cardano Full Node in Rust</text>
  <text x="450" y="56" text-anchor="middle" fill="#94a3b8" font-size="11">10-crate workspace &#xB7; ~1.3M lines of Rust &#xB7; Built by Sandstone</text>

  <!-- ═══════ TOP ROW: Node + Consensus ═══════ -->
  <rect x="40" y="80" width="240" height="110" rx="10" fill="url(#rustGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="160" y="106" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">torsten-node</text>
  <text x="160" y="122" text-anchor="middle" fill="#fecaca" font-size="9">Main Binary &amp; Orchestration</text>
  <line x1="60" y1="130" x2="260" y2="130" stroke="#fca5a5" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="55" y="138" width="100" height="20" rx="4" fill="#991b1b" opacity="0.6"/>
  <text x="105" y="152" text-anchor="middle" fill="#fecaca" font-size="8">Config &amp; Topology</text>
  <rect x="165" y="138" width="100" height="20" rx="4" fill="#991b1b" opacity="0.6"/>
  <text x="215" y="152" text-anchor="middle" fill="#fecaca" font-size="8">Mithril Import</text>
  <rect x="55" y="162" width="210" height="20" rx="4" fill="#991b1b" opacity="0.6"/>
  <text x="160" y="176" text-anchor="middle" fill="#fecaca" font-size="8">Pipelined Multi-Peer Sync</text>

  <rect x="330" y="80" width="240" height="110" rx="10" fill="url(#coreGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="450" y="106" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">torsten-consensus</text>
  <text x="450" y="122" text-anchor="middle" fill="#bfdbfe" font-size="9">Ouroboros Praos</text>
  <line x1="350" y1="130" x2="550" y2="130" stroke="#60a5fa" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="345" y="138" width="100" height="20" rx="4" fill="#1e40af" opacity="0.6"/>
  <text x="395" y="152" text-anchor="middle" fill="#bfdbfe" font-size="8">VRF Leader Check</text>
  <rect x="455" y="138" width="100" height="20" rx="4" fill="#1e40af" opacity="0.6"/>
  <text x="505" y="152" text-anchor="middle" fill="#bfdbfe" font-size="8">KES Validation</text>
  <rect x="345" y="162" width="210" height="20" rx="4" fill="#1e40af" opacity="0.6"/>
  <text x="450" y="176" text-anchor="middle" fill="#bfdbfe" font-size="8">Chain Selection &amp; Epoch Transitions</text>

  <rect x="620" y="80" width="240" height="110" rx="10" fill="url(#coreGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="740" y="106" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">torsten-ledger</text>
  <text x="740" y="122" text-anchor="middle" fill="#bfdbfe" font-size="9">Transaction Validation</text>
  <line x1="640" y1="130" x2="840" y2="130" stroke="#60a5fa" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="635" y="138" width="100" height="20" rx="4" fill="#1e40af" opacity="0.6"/>
  <text x="685" y="152" text-anchor="middle" fill="#bfdbfe" font-size="8">UTxO Set</text>
  <rect x="745" y="138" width="100" height="20" rx="4" fill="#1e40af" opacity="0.6"/>
  <text x="795" y="152" text-anchor="middle" fill="#bfdbfe" font-size="8">Certificates</text>
  <rect x="635" y="162" width="210" height="20" rx="4" fill="#1e40af" opacity="0.6"/>
  <text x="740" y="176" text-anchor="middle" fill="#bfdbfe" font-size="8">Plutus V1/V2/V3 &amp; Native Scripts</text>

  <!-- Arrows: node -> consensus -> ledger -->
  <line x1="280" y1="135" x2="328" y2="135" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="326,131 334,135 326,139" fill="#94a3b8"/>
  <line x1="570" y1="135" x2="618" y2="135" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="616,131 624,135 616,139" fill="#94a3b8"/>

  <!-- ═══════ MIDDLE ROW: Networking + Crypto + Serialization ═══════ -->
  <rect x="40" y="220" width="260" height="90" rx="10" fill="url(#netGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="170" y="246" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">torsten-network</text>
  <text x="170" y="262" text-anchor="middle" fill="#ddd6fe" font-size="9">Ouroboros Mini-Protocols</text>
  <rect x="55" y="272" width="70" height="18" rx="4" fill="#5b21b6" opacity="0.6"/>
  <text x="90" y="284" text-anchor="middle" fill="#ddd6fe" font-size="7">ChainSync</text>
  <rect x="130" y="272" width="70" height="18" rx="4" fill="#5b21b6" opacity="0.6"/>
  <text x="165" y="284" text-anchor="middle" fill="#ddd6fe" font-size="7">BlockFetch</text>
  <rect x="205" y="272" width="80" height="18" rx="4" fill="#5b21b6" opacity="0.6"/>
  <text x="245" y="284" text-anchor="middle" fill="#ddd6fe" font-size="7">TxSubmission</text>

  <rect x="330" y="220" width="240" height="90" rx="10" fill="url(#netGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="450" y="246" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">torsten-crypto</text>
  <text x="450" y="262" text-anchor="middle" fill="#ddd6fe" font-size="9">Cryptographic Primitives</text>
  <rect x="345" y="272" width="65" height="18" rx="4" fill="#5b21b6" opacity="0.6"/>
  <text x="377" y="284" text-anchor="middle" fill="#ddd6fe" font-size="7">Ed25519</text>
  <rect x="415" y="272" width="45" height="18" rx="4" fill="#5b21b6" opacity="0.6"/>
  <text x="437" y="284" text-anchor="middle" fill="#ddd6fe" font-size="7">VRF</text>
  <rect x="465" y="272" width="45" height="18" rx="4" fill="#5b21b6" opacity="0.6"/>
  <text x="487" y="284" text-anchor="middle" fill="#ddd6fe" font-size="7">KES</text>
  <rect x="515" y="272" width="40" height="18" rx="4" fill="#5b21b6" opacity="0.6"/>
  <text x="535" y="284" text-anchor="middle" fill="#ddd6fe" font-size="7">BLS</text>

  <rect x="600" y="220" width="260" height="90" rx="10" fill="url(#netGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="730" y="246" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">torsten-serialization</text>
  <text x="730" y="262" text-anchor="middle" fill="#ddd6fe" font-size="9">CBOR Encoding/Decoding via Pallas</text>
  <rect x="625" y="272" width="90" height="18" rx="4" fill="#5b21b6" opacity="0.6"/>
  <text x="670" y="284" text-anchor="middle" fill="#ddd6fe" font-size="7">Multi-Era Blocks</text>
  <rect x="725" y="272" width="110" height="18" rx="4" fill="#5b21b6" opacity="0.6"/>
  <text x="780" y="284" text-anchor="middle" fill="#ddd6fe" font-size="7">Tx &amp; Header Parsing</text>

  <!-- Arrows: top to middle -->
  <line x1="160" y1="190" x2="170" y2="218" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="450" y1="190" x2="450" y2="218" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="740" y1="190" x2="730" y2="218" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- ═══════ BOTTOM ROW: Storage + Mempool + CLI + Primitives ═══════ -->
  <rect x="40" y="340" width="190" height="70" rx="10" fill="url(#storGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="135" y="366" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">torsten-storage</text>
  <text x="135" y="382" text-anchor="middle" fill="#a7f3d0" font-size="9">ChainDB: ImmutableDB (RocksDB)</text>
  <text x="135" y="396" text-anchor="middle" fill="#a7f3d0" font-size="9">+ VolatileDB (In-Memory)</text>

  <rect x="260" y="340" width="170" height="70" rx="10" fill="url(#storGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="345" y="366" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">torsten-mempool</text>
  <text x="345" y="382" text-anchor="middle" fill="#a7f3d0" font-size="9">Thread-Safe Tx Pool</text>
  <text x="345" y="396" text-anchor="middle" fill="#a7f3d0" font-size="9">Rollback-Aware</text>

  <rect x="460" y="340" width="190" height="70" rx="10" fill="url(#toolGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="555" y="366" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">torsten-cli</text>
  <text x="555" y="382" text-anchor="middle" fill="#fef3c7" font-size="9">cardano-cli Compatible</text>
  <text x="555" y="396" text-anchor="middle" fill="#fef3c7" font-size="9">33+ Subcommands</text>

  <rect x="680" y="340" width="180" height="70" rx="10" fill="url(#toolGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="770" y="366" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">torsten-primitives</text>
  <text x="770" y="382" text-anchor="middle" fill="#fef3c7" font-size="9">Core Types: Hashes, Blocks</text>
  <text x="770" y="396" text-anchor="middle" fill="#fef3c7" font-size="9">Txs, Addresses, Params</text>

  <!-- ═══════ LEGEND ═══════ -->
  <rect x="40" y="435" width="820" height="65" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="450" y="455" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">KEY DEPENDENCIES</text>
  <rect x="60" y="468" width="12" height="12" rx="3" fill="#e45a2e"/>
  <text x="78" y="478" fill="#94a3b8" font-size="9">Tokio (async runtime)</text>
  <rect x="210" y="468" width="12" height="12" rx="3" fill="#3b82f6"/>
  <text x="228" y="478" fill="#94a3b8" font-size="9">Pallas (Cardano primitives)</text>
  <rect x="400" y="468" width="12" height="12" rx="3" fill="#8b5cf6"/>
  <text x="418" y="478" fill="#94a3b8" font-size="9">RocksDB (persistent storage)</text>
  <rect x="590" y="468" width="12" height="12" rx="3" fill="#10b981"/>
  <text x="608" y="478" fill="#94a3b8" font-size="9">uplc (Plutus CEK machine)</text>
  <rect x="770" y="468" width="12" height="12" rx="3" fill="#f59e0b"/>
  <text x="788" y="478" fill="#94a3b8" font-size="9">ed25519-dalek</text>
</svg>