<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="immGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="volGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ledGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#94a3b8">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#60a5fa">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#fbbf24">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#34d399">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700" letter-spacing="0.5">ChainDB: Three-Database Storage Architecture</text>
  <text x="450" y="50" text-anchor="middle" fill="#94a3b8" font-size="10">ouroboros-consensus storage engine</text>

  <!-- ═══════ CHAINDB CONTAINER ═══════ -->
  <rect x="30" y="65" width="840" height="250" rx="10" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.5"/>
  <text x="55" y="83" fill="#c4b5fd" font-size="10" font-weight="600">ChainDB</text>

  <!-- ═══════ IMMUTABLE DB ═══════ -->
  <rect x="55" y="100" width="240" height="145" rx="8" fill="url(#immGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="175" y="125" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">ImmutableDB</text>
  <line x1="75" y1="133" x2="275" y2="133" stroke="#bfdbfe" stroke-opacity="0.3" stroke-width="1"/>
  <text x="175" y="150" text-anchor="middle" fill="#bfdbfe" font-size="9.5">Append-only, finalised blocks</text>
  <text x="175" y="165" text-anchor="middle" fill="#bfdbfe" font-size="9.5">Organised by epoch chunks</text>
  <text x="175" y="180" text-anchor="middle" fill="#bfdbfe" font-size="9.5">Secondary indices for lookup</text>
  <text x="175" y="195" text-anchor="middle" fill="#bfdbfe" font-size="9.5">Iterator-based streaming</text>

  <!-- Epoch chunk visualization -->
  <rect x="80" y="208" width="42" height="22" rx="3" fill="#1e40af" opacity="0.8"/>
  <text x="101" y="223" text-anchor="middle" fill="#93c5fd" font-size="7.5">Epoch 1</text>
  <rect x="127" y="208" width="42" height="22" rx="3" fill="#1e40af" opacity="0.8"/>
  <text x="148" y="223" text-anchor="middle" fill="#93c5fd" font-size="7.5">Epoch 2</text>
  <rect x="174" y="208" width="22" height="22" rx="3" fill="#1e40af" opacity="0.8"/>
  <text x="185" y="223" text-anchor="middle" fill="#93c5fd" font-size="7.5">...</text>
  <rect x="201" y="208" width="42" height="22" rx="3" fill="#1e40af" opacity="0.8"/>
  <text x="222" y="223" text-anchor="middle" fill="#93c5fd" font-size="7.5">Epoch N</text>

  <!-- ═══════ VOLATILE DB ═══════ -->
  <rect x="330" y="100" width="240" height="145" rx="8" fill="url(#volGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="450" y="125" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">VolatileDB</text>
  <line x1="350" y1="133" x2="550" y2="133" stroke="#fef3c7" stroke-opacity="0.3" stroke-width="1"/>
  <text x="450" y="150" text-anchor="middle" fill="#fef3c7" font-size="9.5">Hash-indexed, recent blocks</text>
  <text x="450" y="165" text-anchor="middle" fill="#fef3c7" font-size="9.5">Multiple competing forks</text>
  <text x="450" y="180" text-anchor="middle" fill="#fef3c7" font-size="9.5">Successor map for chain selection</text>
  <text x="450" y="195" text-anchor="middle" fill="#fef3c7" font-size="9.5">Blocks may be rolled back</text>

  <!-- Fork visualization -->
  <line x1="365" y1="225" x2="415" y2="225" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
  <line x1="415" y1="225" x2="455" y2="212" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
  <line x1="415" y1="225" x2="455" y2="225" stroke="#fbbf24" stroke-width="2" opacity="0.8"/>
  <line x1="415" y1="225" x2="455" y2="238" stroke="#fbbf24" stroke-width="2" opacity="0.4"/>
  <circle cx="365" cy="225" r="3" fill="#fbbf24" opacity="0.6"/>
  <circle cx="415" cy="225" r="3" fill="#fbbf24" opacity="0.8"/>
  <circle cx="455" cy="212" r="3" fill="#fbbf24" opacity="0.6"/>
  <circle cx="455" cy="225" r="3" fill="#fbbf24" opacity="0.8"/>
  <circle cx="455" cy="238" r="3" fill="#fbbf24" opacity="0.4"/>
  <line x1="455" y1="225" x2="530" y2="225" stroke="#fbbf24" stroke-width="2" opacity="0.8"/>
  <circle cx="495" cy="225" r="3" fill="#fbbf24" opacity="0.8"/>
  <circle cx="530" cy="225" r="3" fill="#fbbf24" opacity="0.8"/>
  <text x="500" y="238" fill="#fbbf24" font-size="7" opacity="0.7">tip</text>

  <!-- ═══════ LEDGER DB ═══════ -->
  <rect x="605" y="100" width="240" height="145" rx="8" fill="url(#ledGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="725" y="125" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">LedgerDB</text>
  <line x1="625" y1="133" x2="825" y2="133" stroke="#d1fae5" stroke-opacity="0.3" stroke-width="1"/>
  <text x="725" y="150" text-anchor="middle" fill="#d1fae5" font-size="9.5">Ledger state at chain tip</text>
  <text x="725" y="165" text-anchor="middle" fill="#d1fae5" font-size="9.5">Past k states for rollbacks</text>
  <text x="725" y="180" text-anchor="middle" fill="#d1fae5" font-size="9.5">Periodic disk snapshots</text>

  <!-- Backend selector -->
  <rect x="625" y="195" width="95" height="34" rx="4" fill="#065f46" opacity="0.8"/>
  <text x="672" y="210" text-anchor="middle" fill="#6ee7b7" font-size="8" font-weight="600">V2InMemory</text>
  <text x="672" y="222" text-anchor="middle" fill="#6ee7b7" font-size="7">Full UTxO in RAM</text>
  <rect x="730" y="195" width="95" height="34" rx="4" fill="#065f46" opacity="0.8"/>
  <text x="777" y="210" text-anchor="middle" fill="#6ee7b7" font-size="8" font-weight="600">V1LMDB</text>
  <text x="777" y="222" text-anchor="middle" fill="#6ee7b7" font-size="7">Disk-backed diffs</text>

  <!-- ═══════ ARROWS BETWEEN DATABASES ═══════ -->

  <!-- Volatile to Immutable: blocks become immutable after k confirmations -->
  <line x1="330" y1="155" x2="300" y2="155" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="315" y="148" text-anchor="middle" fill="#60a5fa" font-size="7.5">After k blocks</text>

  <!-- Volatile to Ledger: new blocks update ledger state -->
  <line x1="570" y1="155" x2="600" y2="155" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="585" y="148" text-anchor="middle" fill="#34d399" font-size="7.5">Validate</text>

  <!-- ═══════ BACKGROUND THREADS ═══════ -->
  <text x="450" y="290" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Background Threads</text>

  <rect x="80" y="305" width="220" height="44" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="190" y="324" text-anchor="middle" fill="#60a5fa" font-size="9.5" font-weight="600">Copy Thread</text>
  <text x="190" y="339" text-anchor="middle" fill="#94a3b8" font-size="8">Moves finalised blocks from</text>
  <text x="190" y="349" text-anchor="middle" fill="#94a3b8" font-size="8">VolatileDB to ImmutableDB</text>

  <rect x="340" y="305" width="220" height="44" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="324" text-anchor="middle" fill="#fbbf24" font-size="9.5" font-weight="600">GC Thread</text>
  <text x="450" y="339" text-anchor="middle" fill="#94a3b8" font-size="8">Garbage-collects stale blocks</text>
  <text x="450" y="349" text-anchor="middle" fill="#94a3b8" font-size="8">from VolatileDB</text>

  <rect x="600" y="305" width="220" height="44" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="710" y="324" text-anchor="middle" fill="#34d399" font-size="9.5" font-weight="600">Snapshot Thread</text>
  <text x="710" y="339" text-anchor="middle" fill="#94a3b8" font-size="8">Periodically writes ledger</text>
  <text x="710" y="349" text-anchor="middle" fill="#94a3b8" font-size="8">state snapshots to disk</text>

  <!-- Immutable tip annotation -->
  <text x="175" y="260" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-style="italic">Immutable tip (depth &gt; k)</text>

  <!-- Chain tip annotation -->
  <text x="450" y="260" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-style="italic">Volatile tip (may fork)</text>

  <!-- Ledger state annotation -->
  <text x="725" y="260" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-style="italic">Current ledger state</text>

  <!-- Security parameter note -->
  <text x="450" y="400" text-anchor="middle" fill="#64748b" font-size="8.5">k = security parameter (2160 blocks on mainnet) &#8212; blocks deeper than k are considered final</text>
</svg>
